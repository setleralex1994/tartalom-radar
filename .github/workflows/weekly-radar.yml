name: Heti Tartalom Radar

on:
  schedule:
    # Minden hetfo 06:00 UTC (nyaron ~08:00, telen ~07:00 CET). A gepednek nem kell bekapcsolva lennie.
    # Heti egy futas: gyujtes + magyar osszefoglalo + heti e-mail. Igy a legolcsobb.
    - cron: '0 6 * * 1'
  workflow_dispatch: {} # kezi inditas is lehetseges a GitHub Actions fulon

permissions:
  contents: write # a frissitett hirtar visszacommitolasahoz kell

jobs:
  radar:
    runs-on: ubuntu-latest
    steps:
      - name: Kod letoltese
        uses: actions/checkout@v4

      - name: Node beallitasa
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fuggosegek
        run: npm ci

      - name: Radar futtatasa (gyujtes + magyar osszefoglalo + heti e-mail)
        # ANTHROPIC_API_KEY nelkul: csak gyujtes. Kulccsal: magyar osszefoglalo + relevancia + e-mail.
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          DIGEST_TO: ${{ secrets.DIGEST_TO }}
          RADAR_DAYS: '7'
          MIN_RELEVANCE: '3'
        run: node src/radar.js

      - name: Frissitett hirtar visszacommitolasa
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data/items.json
          if git diff --staged --quiet; then
            echo "Nincs valtozas a hirtarban."
          else
            git commit -m "data: heti hir-frissites [skip ci]"
            git push
          fi

      - name: Heti archivum feltoltese
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: heti-archivum
          path: archive/*.html
          if-no-files-found: ignore
