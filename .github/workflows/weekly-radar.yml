name: Tartalom Radar (napi gyűjtés + heti e-mail)

on:
  schedule:
    # Minden nap 06:00 UTC (nyaron ~08:00, telen ~07:00 CET). A gepednek nem kell bekapcsolva lennie.
    # A felulet igy naponta frissul; az osszefoglalo e-mail viszont csak hetfon megy ki.
    - cron: '0 6 * * *'
  workflow_dispatch: {} # kezi inditas is lehetseges a GitHub Actions fulon

permissions:
  contents: write # a frissitett hirtar visszacommitolasahoz kell

jobs:
  radar:
    runs-on: ubuntu-latest
    steps:
      - name: Kod letoltese
        uses: actions/checkout@v4

      - name: Node beallitasa
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fuggosegek
        run: npm ci

      - name: Radar futtatasa (napi gyujtes; e-mail csak hetfon)
        # ANTHROPIC_API_KEY nelkul: csak gyujtes. Kulccsal: magyar osszefoglalo + relevancia.
        # E-mail (RADAR_SEND=1) csak hetfon (UTC nap = 1).
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          DIGEST_TO: ${{ secrets.DIGEST_TO }}
          RADAR_DAYS: '7'
          MIN_RELEVANCE: '3'
        run: |
          if [ "$(date -u +%u)" = "1" ]; then
            export RADAR_SEND=1
            echo "Hetfo — heti osszefoglalo e-mail is megy."
          else
            export RADAR_SEND=0
            echo "Napi gyujtes — nincs e-mail."
          fi
          node src/radar.js

      - name: Frissitett hirtar visszacommitolasa
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data/items.json
          if git diff --staged --quiet; then
            echo "Nincs valtozas a hirtarban."
          else
            git commit -m "data: napi hir-frissites [skip ci]"
            git push
          fi

      - name: Heti archivum feltoltese
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: heti-archivum
          path: archive/*.html
          if-no-files-found: ignore
